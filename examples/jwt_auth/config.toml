[logging]
level = "info"

[server]
http_addr = "127.0.0.1:3001"
https_addr = "127.0.0.1:4431"

[proxy]
upstreams = ["127.0.0.1:8080"]
upstream_tls = false
upstream_sni = ""
upstream_alpn = "http/1.1"

[proxy.tls]
enabled = false
cert = ""
key = ""

[lb]
strategy = "RoundRobin"

[lb.circuit_breaker]
enabled = false
threshold = 5
reset_secs = 30

[lb.rate_limiter]
enabled = false
rate = 1000

[lb.health_check]
period = 10
timeout = 3

[auth]
provider = "kratos_local"
jwt_secret = "super_secret_pqc_key_123456789012"
issuer = "https://auth.chainless.local"
