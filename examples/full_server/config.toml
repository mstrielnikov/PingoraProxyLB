[logging]
level = "info"

[server]
http_addr = "0.0.0.0:3000"
https_addr = "0.0.0.0:443"

[proxy]
upstreams = ["127.0.0.1:8080", "127.0.0.1:8081"]
upstream_tls = false
upstream_sni = ""
upstream_alpn = "http/1.1"

[proxy.tls]
enabled = false
cert = ""
key = ""

[lb]
strategy = "RoundRobin"

[lb.circuit_breaker]
enabled = true
threshold = 5
reset_secs = 30

[lb.rate_limiter]
enabled = true
rate = 100

[lb.health_check]
period = 10
timeout = 3
